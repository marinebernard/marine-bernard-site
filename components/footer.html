<style>
.site-footer{
  padding:1.5rem;text-align:center;
  border-top:0.5px solid rgba(139,107,177,0.12);
  background:#F0E6FF;
  font-family:'Inter',sans-serif;
}
.site-footer .footer-flower{width:36px;height:36px;display:block;margin:0 auto;}
.site-footer .footer-flower .petal-a{fill:#8B6BB1;}
.site-footer .footer-flower .petal-b{fill:#C9A96E;}
.site-footer .footer-flower .center{fill:#2D1B69;}
.site-footer .footer-name{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:13px;color:#2D1B69;margin:8px 0 0;
}
.site-footer .footer-socials{display:flex;justify-content:center;gap:8px;margin-top:10px;}
.site-footer .footer-socials a{
  display:inline-flex;align-items:center;justify-content:center;
  width:30px;height:30px;border-radius:12px;
  font-size:11px;text-decoration:none;
}
.site-footer .footer-socials a svg{width:14px;height:14px;}
.site-footer .s-fb{background:#1877F2;}
.site-footer .s-ig{background:#dc2743;}
.site-footer .s-km{background:#6AA127;}
.site-footer .footer-copyright{font-size:11px;color:#b0a0c8;margin:10px 0 0;}

/* Variante verte — univers rando (aucun violet) */
body.rando .site-footer{
  border-top:0.5px solid rgba(59,109,17,0.12);
  background:#EAF3DE;
}
body.rando .site-footer .footer-flower .petal-a{fill:#3B6D11;}
body.rando .site-footer .footer-flower .petal-b{fill:#C0DD97;}
body.rando .site-footer .footer-flower .center{fill:#27500A;}
body.rando .site-footer .footer-name{color:#27500A;}
body.rando .site-footer .footer-copyright{color:#7a9a6a;}
</style>
