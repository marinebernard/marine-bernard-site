<style>
.site-header-rando{
  height:64px;
  background:rgba(234,243,222,0.95);
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(59,109,17,0.18);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 2.5rem;
  font-family:'Inter',sans-serif;
}
.site-header-rando .header-logo-wrap{
  display:inline-flex;align-items:center;gap:6px;
  position:relative;text-decoration:none;
}
.site-header-rando .header-logo{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:15px;color:#27500A;text-decoration:none;
}
.site-header-rando .logo-grass{flex-shrink:0;overflow:visible;}
.site-header-rando .logo-grass .blade{
  stroke-width:1.6;stroke-linecap:round;
  transform-box:fill-box;transform-origin:50% 100%;
  animation-name:logoSway;animation-timing-function:ease-in-out;
  animation-iteration-count:infinite;animation-direction:alternate;
}
.site-header-rando .logo-grass .blade-1{stroke:#27500A;animation-duration:2.1s;}
.site-header-rando .logo-grass .blade-2{stroke:#3B6D11;animation-duration:2.6s;animation-delay:0.2s;}
.site-header-rando .logo-grass .blade-3{stroke:#27500A;animation-duration:2.3s;animation-delay:0.4s;}
@keyframes logoSway{from{transform:rotate(-9deg)}to{transform:rotate(9deg)}}
.site-header-rando .logo-rain{
  position:absolute;top:-8px;left:0;width:100%;height:18px;
  pointer-events:none;overflow:visible;
}
.site-header-rando .logo-drop{
  position:absolute;top:-8px;width:1px;height:7px;
  background:rgba(59,109,17,0.55);opacity:0;
  animation:logoRainFall 0.9s linear infinite;
}
.site-header-rando .header-logo-wrap:hover .logo-drop{opacity:1;}
@keyframes logoRainFall{
  from{transform:translateY(0)}
  to{transform:translateY(26px)}
}
.site-header-rando .header-nav-wrap{
  display:flex;align-items:center;gap:1.6rem;
}
.site-header-rando .nav-links{
  position:absolute;left:50%;transform:translateX(-50%);
  display:flex;gap:0;list-style:none;margin:0;padding:4px;
  background:#C0DD97;border:0.5px solid rgba(59,109,17,0.25);
  border-radius:30px;
}
.site-header-rando .nav-links li a{
  display:block;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;
  color:#3B6D11;text-decoration:none;
  padding:6px 16px;border-radius:22px;transition:background 0.2s,color 0.2s;
}
.site-header-rando .nav-links li a:hover{background:#27500A;color:#fff;}
.site-header-rando .header-right{display:flex;align-items:center;gap:14px;}
.site-header-rando .header-cta{
  background:#27500A;color:#fff;text-decoration:none;
  border-radius:22px;padding:8px 20px;font-size:12px;
}
.site-header-rando .header-switch{font-size:11px;color:#7a8f5a;text-decoration:none;}
.site-header-rando .header-switch:hover{text-decoration:underline;}
.site-header-rando .header-toggle{
  display:none;background:none;border:none;cursor:none;padding:6px;
  flex-direction:column;justify-content:center;gap:5px;flex-shrink:0;
}
.site-header-rando .header-toggle span{
  display:block;width:22px;height:2px;background:#27500A;border-radius:2px;
  transition:transform 0.25s,opacity 0.25s;
}
.site-header-rando .header-toggle.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.site-header-rando .header-toggle.open span:nth-child(2){opacity:0}
.site-header-rando .header-toggle.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
@media(max-width:768px){
  .site-header-rando{padding:0 1.2rem;}
  .site-header-rando .header-toggle{display:flex;}
  .site-header-rando .header-nav-wrap{
    display:none;position:absolute;top:64px;left:0;right:0;
    flex-direction:column;align-items:stretch;gap:10px;
    background:#FAF8FF;border-bottom:1px solid rgba(59,109,17,0.18);
    padding:14px;box-shadow:0 12px 24px rgba(39,80,10,0.1);
  }
  .site-header-rando .header-nav-wrap.open{display:flex;}
  .site-header-rando .nav-links{
    position:static;left:auto;transform:none;
    flex-direction:column;background:none;border:none;padding:0;gap:4px;
  }
  .site-header-rando .nav-links li a{text-align:center;padding:10px;}
  .site-header-rando .header-right{flex-direction:column;gap:8px;}
  .site-header-rando .header-cta{text-align:center;}
  .site-header-rando .header-switch{text-align:center;}
}
</style>
<header class="site-header-rando">
  <a href="/pages/parcours-komoot.html" class="header-logo-wrap">
    <span class="header-logo">Marine Bernard</span>
    <span class="logo-rain" aria-hidden="true">
      <span class="logo-drop" style="left:4%;animation-delay:0s"></span>
      <span class="logo-drop" style="left:38%;animation-delay:0.25s"></span>
      <span class="logo-drop" style="left:70%;animation-delay:0.5s"></span>
      <span class="logo-drop" style="left:92%;animation-delay:0.15s"></span>
    </span>
    <svg class="logo-grass" viewBox="0 0 20 16" width="15" height="13" aria-hidden="true">
      <line x1="4" y1="16" x2="3" y2="6" class="blade blade-1"/>
      <line x1="10" y1="16" x2="10" y2="3" class="blade blade-2"/>
      <line x1="16" y1="16" x2="17" y2="6" class="blade blade-3"/>
    </svg>
  </a>
  <div class="header-nav-wrap">
    <ul class="nav-links">
      <li><a href="/pages/parcours-komoot.html">Accueil</a></li>
      <li><a href="/pages/parcours-komoot.html">Sentiers</a></li>
      <li><a href="/index.html#photos">Galerie</a></li>
      <li><a href="/pages/blog.html">Blog</a></li>
      <li><a href="/index.html#contact">Contact</a></li>
    </ul>
    <div class="header-right">
      <a href="/index.html#contact" class="header-cta">Me suivre</a>
      <a href="/index.html" class="header-switch">→ Univers pro</a>
    </div>
  </div>
  <button class="header-toggle" id="headerToggle" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</header>
